name: Scrape ParkWhiz

# ParkWhiz runs on the DATACENTER proxy pool (separate, larger allowance than the
# residential one Way uses). Like SpotHero it stays on GitHub Actions for the
# rotating runner IP; the proxy handles ParkWhiz's geo-WAF. Every 2 hours matches
# the cache-first cadence and keeps Actions minutes down (it launches a browser
# per venue, ~10-20 min for 50). Jitter + overlap guard as with SpotHero.
on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:

concurrency:
  group: scrape-parkwhiz
  cancel-in-progress: false

jobs:
  parkwhiz:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Jitter (avoid a fixed on-the-hour fingerprint)
        run: sleep $((RANDOM % 300))
      - name: Scrape ParkWhiz (50 venues)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          PARKWHIZ_PROXY_URLS: ${{ secrets.PARKWHIZ_PROXY_URLS }}
          PARKWHIZ_TZ_OFFSET: ${{ secrets.PARKWHIZ_TZ_OFFSET }}
        run: npm run scrape:parkwhiz
