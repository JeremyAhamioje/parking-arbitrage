name: Scrape ParkWhiz

# MOVED TO THE BOX (scripts/box-cron). ParkWhiz's WAF 403s GitHub's datacenter
# runner IP, so this job wrote 0 rows from Actions. It now runs from the box on its
# own US IP. This workflow is kept manual-only as a fallback/reference.
on:
  workflow_dispatch:

concurrency:
  group: scrape-parkwhiz
  cancel-in-progress: false

jobs:
  parkwhiz:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Jitter (avoid a fixed on-the-hour fingerprint)
        run: sleep $((RANDOM % 300))
      - name: Scrape ParkWhiz (50 venues)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          PARKWHIZ_PROXY_URLS: ${{ secrets.PARKWHIZ_PROXY_URLS }}
          PARKWHIZ_TZ_OFFSET: ${{ secrets.PARKWHIZ_TZ_OFFSET }}
        run: npm run scrape:parkwhiz
