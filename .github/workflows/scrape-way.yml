name: Scrape Way

# MOVED TO THE BOX (scripts/box-cron). Way's residential proxy refuses GitHub's
# runner IP (net::ERR_TUNNEL_CONNECTION_FAILED), so this job couldn't boot the
# browser from Actions. It now runs from the box, where the residential proxy works
# (same path the live engine uses). Kept manual-only as a fallback/reference.
on:
  workflow_dispatch:

jobs:
  way:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: sudo apt-get update && sudo apt-get install -y xvfb   # headed Chromium needs a virtual display for Cloudflare
      - name: Scrape Way (50 venues, xvfb + residential proxy)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          WAY_PROXY_URL: ${{ secrets.WAY_PROXY_URL }}
          RESIDENTIAL_PROXY_URL: ${{ secrets.RESIDENTIAL_PROXY_URL }}
          WAY_PROXY_STICKY: '1'
        run: npm run scrape:way:prod
