name: Scrape SpotHero

# WHY this stays on GitHub Actions (not the VPS): each run executes on a FRESH
# GitHub-hosted runner with a DIFFERENT Azure datacenter IP. That rotation is
# exactly what defeats single-IP detection — SpotHero never sees the same address
# scraping all 50 venues on a fixed cadence. Running it from the box's one static
# IP every couple of hours is the pattern that WOULD get flagged, so we keep it here.
#
# Cadence: every 2 hours (matches the cache-first "data is fresh < ~hour" model and
# halves Actions minutes vs hourly) + a random 0-5 min jitter so we're not a
# clockwork on-the-hour signature. The overlap guard stops a slow run (~20-30 min
# for 50 venues) from colliding with the next trigger.
on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:          # manual run from the Actions tab

concurrency:
  group: scrape-spothero
  cancel-in-progress: false

jobs:
  spothero:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Jitter (avoid a fixed on-the-hour fingerprint)
        run: sleep $((RANDOM % 300))
      - name: Scrape SpotHero (50 venues)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: node src/index.js
